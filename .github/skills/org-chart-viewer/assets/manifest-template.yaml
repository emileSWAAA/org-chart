# Org Chart Manifest Template
# Copy this file, fill in your entities, and run:
#   npx github:emileSWAAA/org-chart --file ./org-chart.yaml

name: ORGANIZATION_NAME

entities:
  # Root department
  - id: company
    type: department
    name: ORGANIZATION_NAME
    metadata:
      founded: "YEAR"

  # Add departments (parentId = parent department)
