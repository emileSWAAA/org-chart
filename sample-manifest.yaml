name: Acme Corporation

entities:
  # Root Department
  - id: company
    type: department
    name: Acme Corporation
    metadata:
      founded: "2010"
      employees: 150

  # Level 1 Departments (report to company)
  - id: engineering
    type: department
    name: Engineering
    parentId: company
    metadata:
      headcount: 45
      budget: "$5M"

  - id: sales
    type: department
    name: Sales
    parentId: company
    metadata:
      headcount: 30
      quota: "$20M"

  - id: operations
    type: department
    name: Operations
    parentId: company
    metadata:
      headcount: 25

  # Level 2 Departments
  - id: frontend
    type: department
    name: Frontend Team
    parentId: engineering
    metadata:
      headcount: 15

  - id: backend
    type: department
    name: Backend Team
